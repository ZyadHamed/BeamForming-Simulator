<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B-Mode Viewer</title>
    <style>
        body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
        textarea { width: 100%; height: 150px; background: #16213e; color: #0f0;
                   border: 1px solid #0f3460; padding: 10px; font-size: 12px; }
        canvas { border: 1px solid #0f3460; margin-top: 10px; }
        button { background: #0f3460; color: #eee; border: none; padding: 10px 20px;
                 cursor: pointer; margin-top: 10px; font-size: 14px; }
        button:hover { background: #e94560; }
        .stats { margin-top: 10px; color: #0f0; }
    </style>
</head>
<body>
    <h2>🔬 B-Mode image_grid Visualizer</h2>
    <p>Paste the full JSON response from <code>/scan/bmode</code> below:</p>
    <textarea id="jsonInput" placeholder='{"sector_angles_deg":[...],"axial_depths_mm":[...],"image_grid":[[...],...]}'></textarea>
    <br>
    <button onclick="renderBMode()">Render B-Mode</button>
    <button onclick="fetchAndRender()">Fetch Live from API</button>
    <div class="stats" id="stats"></div>
    <br>
    <canvas id="bmode_canvas" width="600" height="600"></canvas>

    <script>
    async function fetchAndRender() {
        // Step 1: Create scenario
        await fetch("http://localhost:8000/scenario/create", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                session_id: "html_test",
                probe: {
                    num_elements: 32, pitch_mm: 0.3, frequency_mhz: 5.0,
                    focus_depth_mm: 40.0, speed_of_sound_mm_us: 1.54,
                    snr_db: 40.0, apodization_window: "hanning", geometry: "linear"
                },
                use_shepp_logan: true
            })
        });

        // Step 2: B-Mode scan
        const res = await fetch("http://localhost:8000/scan/bmode", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                session_id: "html_test",
                start_angle: -35.0, end_angle: 35.0,
                num_lines: 32, max_depth_mm: 70.0
            })
        });

        const data = await res.json();
        document.getElementById("jsonInput").value = JSON.stringify(data);
        renderFromData(data);
    }

    function renderBMode() {
        const raw = document.getElementById("jsonInput").value;
        const data = JSON.parse(raw);
        renderFromData(data);
    }

    function renderFromData(data) {
        const grid = data.image_grid;
        const numLines = grid.length;
        const numDepths = grid[0].length;

        // Find min/max for normalization
        let vmin = Infinity, vmax = -Infinity;
        for (let i = 0; i < numLines; i++) {
            for (let j = 0; j < numDepths; j++) {
                if (grid[i][j] < vmin) vmin = grid[i][j];
                if (grid[i][j] > vmax) vmax = grid[i][j];
            }
        }
        const range = vmax - vmin || 1;

        const canvas = document.getElementById("bmode_canvas");
        const W = 600, H = 600;
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext("2d");

        // Sector scan rendering
        const angles = data.sector_angles_deg.map(a => a * Math.PI / 180);
        const depths = data.axial_depths_mm;
        const maxDepth = depths[depths.length - 1];
        const scale = (H * 0.9) / maxDepth;
        const cx = W / 2, cy = 20;  // probe position at top-center

        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, W, H);

        for (let i = 0; i < numLines - 1; i++) {
            for (let j = 0; j < numDepths - 1; j++) {
                const val = (grid[i][j] - vmin) / range;
                const gray = Math.floor(val * 255);

                const a1 = angles[i], a2 = angles[i + 1];
                const d1 = depths[j] * scale, d2 = depths[j + 1] * scale;

                // Four corners of the pixel quad
                const x1 = cx + d1 * Math.sin(a1);
                const y1 = cy + d1 * Math.cos(a1);
                const x2 = cx + d1 * Math.sin(a2);
                const y2 = cy + d1 * Math.cos(a2);
                const x3 = cx + d2 * Math.sin(a2);
                const y3 = cy + d2 * Math.cos(a2);
                const x4 = cx + d2 * Math.sin(a1);
                const y4 = cy + d2 * Math.cos(a1);

                ctx.fillStyle = `rgb(${gray},${gray},${gray})`;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineTo(x3, y3);
                ctx.lineTo(x4, y4);
                ctx.closePath();
                ctx.fill();
            }
        }

        // Stats
        document.getElementById("stats").innerHTML =
            `Grid: ${numLines} lines × ${numDepths} depths | ` +
            `Values: [${vmin.toFixed(4)}, ${vmax.toFixed(4)}] | ` +
            `Angles: [${data.sector_angles_deg[0]}°, ${data.sector_angles_deg[numLines-1]}°]`;
    }
    </script>
</body>
</html>
