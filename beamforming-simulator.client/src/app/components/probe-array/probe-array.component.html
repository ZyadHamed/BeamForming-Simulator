<!-- ════════════════════════════════════════════════════════════════
     ProbeArrayComponent template
     ════════════════════════════════════════════════════════════════ -->
<div class="probe-array">

  <!-- ── Array header ─────────────────────────────────────────── -->
  <div class="array-header">
    <div class="array-title-row">
      <div class="array-badge">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="1" y="5" width="3" height="7" rx="1"/>
          <rect x="6" y="3" width="3" height="9" rx="1"/>
          <rect x="11" y="5" width="3" height="7" rx="1"/>
        </svg>
      </div>
      <span class="array-label">{{ label }}</span>
      <span class="array-count">{{ elements.length }} elements</span>
    </div>

    <!-- Panel tabs -->
    <div class="panel-tabs">
      <button
        *ngFor="let tab of ['elements','geometry']"
        class="panel-tab"
        [class.active]="panelTab === tab"
        (click)="panelTab = $any(tab)"
      >{{ tab }}</button>
    </div>
  </div>

  <!-- ══ TAB: ELEMENTS ═══════════════════════════════════════════ -->
  <ng-container *ngIf="panelTab === 'elements'">

    <!-- Scroll list of probe-elements -->
    <div class="elements-list">
      <app-probe-element
        *ngFor="let el of elements; trackBy: trackById"
        [config]="el"
        [compact]="true"
        [selected]="el.id === selectedElementId"
        (configChange)="onElementConfigChange($event)"
        (selectEl)="selectElement($event)"
        (deleteEl)="removeElement($event)"
      ></app-probe-element>
    </div>

    <!-- Selected element detail panel -->
    <div class="el-detail-panel" *ngIf="selectedElement">
      <div class="detail-hdr">
        <span class="detail-title">Editing {{ selectedElement.label }}</span>
        <button class="close-btn" (click)="selectedElementId = null">✕</button>
      </div>
      <app-probe-element
        [config]="selectedElement"
        [compact]="false"
        [selected]="true"
        (configChange)="onElementConfigChange($event)"
        (selectEl)="selectElement($event)"
        (deleteEl)="removeElement($event)"
      ></app-probe-element>
    </div>

    <!-- Add element button -->
    <div class="elements-footer">
      <button class="add-el-btn" (click)="addElement()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="8" cy="8" r="6"/>
          <path d="M8 5v6M5 8h6" stroke-linecap="round"/>
        </svg>
        Add Element
      </button>
    </div>

  </ng-container>

  <!-- ══ TAB: GEOMETRY ══════════════════════════════════════════ -->
  <ng-container *ngIf="panelTab === 'geometry'">

    <div class="geo-controls">

      <!-- Geometry type -->
      <div class="ctrl-section">
        <div class="section-label">Array Geometry</div>
        <div class="toggle-row">
          <button
            class="toggle-btn"
            [class.active]="arrayConfig.geometry === 'linear'"
            (click)="setGeometry('linear')"
          >Linear</button>
          <button
            class="toggle-btn"
            [class.active]="arrayConfig.geometry === 'curved'"
            (click)="setGeometry('curved')"
          >Curved</button>
        </div>
      </div>

      <!-- Element spacing -->
      <div class="ctrl-section">
        <div class="ctrl-group">
          <label class="ctrl-label">
            Element Spacing
            <span class="val">{{ arrayConfig.elementSpacing | number:'1.0-1' }} mm</span>
          </label>
          <input type="range" class="styled-slider"
            min="1" max="70" step="0.5"
            [(ngModel)]="arrayConfig.elementSpacing"
            (ngModelChange)="onGeometryChange()"
          />
        </div>

        <!-- Curvature (curved mode only) -->
        <div class="ctrl-group" *ngIf="arrayConfig.geometry === 'curved'">
          <label class="ctrl-label">
            Curvature Radius
            <span class="val">{{ arrayConfig.curvatureRadius | number:'1.0-0' }} mm</span>
          </label>
          <input type="range" class="styled-slider"
            min="20" max="200" step="1"
            [(ngModel)]="arrayConfig.curvatureRadius"
            (ngModelChange)="onGeometryChange()"
          />
        </div>
      </div>

      <!-- Geometry canvas -->
      <div class="geo-canvas-wrap">
        <canvas #geometryCanvas class="geo-canvas"></canvas>
      </div>

    </div>

  </ng-container>
</div>
